name: Lint and Code Validation

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'
          cache-dependency-path: 'yarn.lock'

      - name: Install Frontend Dependencies
        run: yarn install --frozen-lockfile

      - name: Run ESLint
        run: yarn lint

      - name: Run Stylelint
        run: yarn stylelint-linux

      - name: TypeScript Type Check
        # Run tsc compiler manually without emitting files to catch TS typing errors instantly
        run: npx tsc --noEmit --project frontend/tsconfig.json

  backend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          
      - name: Restore dependencies
        run: dotnet restore src/Melodarr.sln
        
      - name: Build and Lint Backend
        # Using format dry-run catches styling/lint issues in modern .NET
        run: |
          dotnet format src/Melodarr.sln whitespace --verify-no-changes
          dotnet build src/Melodarr.sln -c Release --no-restore -warnaserror
